name: Notify client on request completion

on:
  issues:
    types: [closed]

jobs:
  notify:
    if: contains(github.event.issue.labels.*.name, 'client-request')
    runs-on: ubuntu-latest
    steps:
      - name: Ping intake worker
        env:
          GH_TOKEN: ${{ github.token }}
          NOTIFY_URL: ${{ secrets.INTAKE_NOTIFY_URL }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          TITLE: ${{ github.event.issue.title }}
          CLOSED_AT: ${{ github.event.issue.closed_at }}
        run: |
          # Closing comment: newest maintainer comment within 10 minutes of
          # the close. Relayed to the client in the notification email.
          COMMENT=$(gh api "repos/$REPO/issues/$ISSUE/comments?per_page=100" --jq '
            [ .[]
              | select(.author_association == "OWNER" or .author_association == "MEMBER" or .author_association == "COLLABORATOR")
              | select((env.CLOSED_AT | fromdateiso8601) - (.created_at | fromdateiso8601) | fabs < 600)
            ] | last | .body // ""')
          jq -n --argjson issue "$ISSUE" --arg title "$TITLE" --arg comment "$COMMENT" \
            '{issue: $issue, title: $title, comment: $comment}' |
            curl -sf -X POST -H 'content-type: application/json' -d @- "$NOTIFY_URL"
