# Guest reviews, rendered in order on /reviews/ and emitted as Review JSON-LD.
- id: maria-nz
  quote: "Amazing place. full size house. outdoors spaces fantastic with views to die for. Pool and spa very clean, House beautifully furnished and clean. Owner very friendly and knowledgeable. Koala in the tree."
  author: Maria
  location: New Zealand
- id: deborah-au
  quote: "Everything in the home was so practical, combined with the absolutely stunning location and lovely hosts we had the most PERFECT weekend!"
  author: Deborah
  location: Australia
- id: christina-au
  quote: "Great views and fireplace. Comfortable and self contained and had all the conveniences needed. Comfy bed. Wonderful hosts."
  author: Christina
  location: Australia
- id: federico-au
  quote: "The Villa was spotless, comfortable, with pool, spa and a fantastic view. The host was available for our needs and caring. I would recommend this accommodation to any couple looking for a quiet escape in beautiful Mt Tambourine."
  author: Federico
  location: Australia
- id: raquel-es
  quote: "I loved the location, the views, and the space. An absolute bliss. Rowena was an excellent host, very kind and helpful."
  author: Raquel
  location: Spain
- id: seamus-au
  quote: "Owners were lovely people! Place was a nice and cozy little get away with AMAZING views!"
  author: Seamus
  location: Australia
- id: glen-au
  quote: "The friendliness, how clean and spacious it was, the fire was a beautiful night. The free wine and choccies in the fridge which were not \"mini bar\" items, they were freebies which was such a nice touch. I felt very welcome. Rowena even showed me a resident koala with her umbrella when I first arrived which was sensational. Even kindling for the fire so it started so easily. Felt very welcome and enjoyed every minute. If I am ever up that way again, I would definitely consider going back."
  author: Glen
  location: Australia
- id: margo-au
  quote: "Very clean and comfortable. everything was available to use that you could possibly need. The views were stunning. Very quiet and the staff were very helpful and friendly. Loved it."
  author: Margo
  location: Australia
- id: cassandra-my
  quote: "The owner is extremely hospitable and she goes out of her way in making us feel at home. Facilities are very well maintained and the house is very cozy and well furnished. Definitely a great choice for family getaway, and it comes with an amazing view for sunrise too!"
  author: Cassandra
  location: Malaysia
- id: nik-tripadvisor
  quote: "Stayed in the villa, ideal for a couple. Internet included with access to the pool and hot tub. Hosts could not do enough for us. Hot tub is really hot with the jets to keep you on your toes. Sad to leave, but would happily return with the whole family."
  author: Nik
- id: lyndal-google
  quote: "Lovely and clean. Very private and quiet. Our stay was very relaxing. Great views even though our 2nd day was very wet and the clouds had covered our views. Handy location."
  author: Lyndal
- id: bronwyn-tripadvisor
  quote: "What a lovely place! We booked a 2 night stopover and were not disappointed. The owners Rowena and Glen were very helpful as we were unsure of our arrival time. There was a lovely surprise of wine and chocolate which was very thoughtful. The view is spectacular to say the least. Conveniently located for the Sites up in the Mountain."
  author: Bronwyn
- id: heidi-google
  quote: "Rowena went the extra mile when she found out I was not feeling well, she dropped a herbal tea off to me to calm my stomach. Very comfortable and amazing views! Very close to hiking and lovely cafes and restaurants. Will definitely be back!"
  author: Heidi
- id: daniel-google
  quote: "My wife and I recently stayed in the villa. Accommodation was comfortable, clean and in a beautiful location overlooking the valley. Pool and spa were lovely and hosts were kind/helpful. Highly recommend"
  author: Daniel
- id: john-google
  quote: "Fantastic secluded location with a truly incredible view of the GC twinkling in the night. Large home with 2 log burners, essential for the winter months. The hosts were very accommodating and keen to make our stay memorable. Also a heated pool and spa really topped it off."
  author: John
- id: fiona-google
  quote: "Amazing place felt right at home the most beautiful views and had everything we needed and more and the owners are just so accommodating and we can't wait to return soon"
  author: Fiona
- id: kyle-google
  quote: "A fanstastic place to get away to and relax. Views are spectacular. Great for families or small groups"
  author: Kyle
